<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nursery Prices">
    <title>The Old Forge Nursery - Price List 2026</title>
    <style>
        :root { --primary: #2e7d32; --bg: #f4f4f4; --text: #222; --card-bg: #ffffff; --border: #444; --tab-bg: #ffffff; --tab-text: #444; --accent: var(--primary); }
        body { font-family: -apple-system, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); height: 100dvh; display: flex; flex-direction: column; overflow: hidden; padding-top: env(safe-area-inset-top); padding-bottom: env(safe-area-inset-bottom); }
        .header { background: var(--card-bg); padding: 8px 15px; border-bottom: 2px solid var(--border); z-index: 100; flex-shrink: 0; }
        h1 { margin: 0 0 5px 0; font-size: 1em; color: var(--primary); text-transform: uppercase; text-align: center;}
        #search-bar { width: 100%; padding: 10px; font-size: 16px; border: 2px solid var(--border); border-radius: 8px; box-sizing: border-box; }
        .main-layout { display: flex; flex: 1; overflow: hidden; }
        .tab-bar { width: 200px; background: var(--tab-bg); border-right: 2px solid var(--border); display: flex; flex-direction: column; padding: 10px; overflow-y: auto; flex-shrink: 0; }
        .tab-item { padding: 12px; margin-bottom: 6px; border-radius: 8px; font-weight: bold; font-size: 0.9em; color: var(--tab-text); border: 1px solid #bbb; background: #fff; cursor: pointer; }
        .tab-item.active { background: var(--primary); color: white; border-color: var(--primary); }
        .content-area { flex: 1; overflow-y: auto; padding: 15px; -webkit-overflow-scrolling: touch; }
        #home-page { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 50vh; text-align: center; }
        #version-info { margin-top: 30px; font-size: 0.75em; color: #888; font-weight: bold; border-top: 1px solid #ddd; padding-top: 10px; letter-spacing: 1px; text-transform: uppercase; }
        .product-item { background: var(--card-bg); padding: 10px 15px; margin-bottom: 8px; border: 2px solid var(--border); border-radius: 8px; border-left: 10px solid var(--accent); }
        .prod-row { display: flex; align-items: center; gap: 15px; }
        .prod-name { flex: 2; font-size: 1.15em; font-weight: bold; }
        .prod-price { flex: 0 0 80px; background: var(--accent); color: white; padding: 6px; border-radius: 6px; font-weight: 800; text-align: center; font-size: 1em; }
        .prod-offer-col { flex: 1.5; font-size: 0.9em; font-weight: bold; color: #d35400; background: #fff3e0; padding: 4px 10px; border-radius: 6px; border: 1px solid #ffe0b2; text-align: center; white-space: nowrap; }
        .hidden-offer { visibility: hidden; background: transparent; border: transparent; }
        .theme-compost { --accent: #795548; }
        .theme-perennials { --accent: #9c27b0; }
        .theme-shrubs { --accent: #2e7d32; }
        .theme-bedding { --accent: #e91e63; }
        .theme-stone { --accent: #607d8b; }
        .theme-veg { --accent: #fbc02d; }
    </style>
</head>
<body>
    <div class="header">
        <h1>The Old Forge Nursery</h1>
        <input type="text" id="search-bar" placeholder="Search plants (try 'maple' or 'soil')..." oninput="handleSearch()">
    </div>
    <div class="main-layout">
        <div class="tab-bar" id="tab-bar"></div>
        <div class="content-area" id="content-container">
            <div id="home-page">
                <img src="logo.png" alt="Logo" style="max-width: 400px; width: 60%; height: auto;">
                <div style="font-size: 1.5em; font-weight: 600; color: var(--primary); margin-top: 10px;">Price List 2026</div>
                <div id="version-info">
                    App Version: <span id="app-v-num">v7</span> | Updated: <span id="last-update">Checking...</span>
                </div>
            </div>
            <div id="product-view" style="display: none;"></div>
        </div>
    </div>
    <script>
    var APP_VERSION = "v9"; // Update this single line to change the home screen text
    var nurseryData = {};
    var currentCategory = "home";
    var defaultData = "Category,Product Name,Price,Offer,Tags\nInstructions,Please upload prices.csv to GitHub,£0,,";

    if ('serviceWorker' in navigator) { navigator.serviceWorker.register('./sw.js'); }

    // ... (getThemeClass, sanitizeEncoding, parseData functions remain the same) ...

    async function init() {
        // Set the version number on the home screen immediately
        document.getElementById('app-v-num').innerText = APP_VERSION;

        let dataToUse = defaultData;
        try {
            const cacheBuster = '?v=' + new Date().getTime();
            const response = await fetch('prices.csv' + cacheBuster); 
            if (response.ok) {
                const remoteData = await response.text();
                if (remoteData && remoteData.length > 50) {
                    localStorage.setItem('forge_nursery_data', remoteData);
                    dataToUse = remoteData;
                    const lastMod = response.headers.get('Last-Modified');
                    if (lastMod) document.getElementById('last-update').innerText = new Date(lastMod).toLocaleDateString('en-GB');
                }
            }
        } catch (e) { 
            dataToUse = localStorage.getItem('forge_nursery_data') || defaultData;
            document.getElementById('last-update').innerText = "Offline Cache";
        }
        parseData(dataToUse);
        renderTabs();
        showHome();
    }
    
    // ... (rest of your functions: renderTabs, renderList, showHome, showProducts, hideAll, handleSearch, findCatOfProduct) ...

    init();
</script>
</body>
</html>
