<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>The Old Forge Nursery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <div class="app-container">
        <header class="header">
            <h1>The Old Forge Nursery</h1>
            <div class="search-wrapper">
                <input type="text" id="main-search" placeholder="Search plants or tags..." oninput="app.handleSearch()">
            </div>
        </header>

<aside class="sidebar">
    <div id="sidebar-nav" class="sidebar-nav-links">
        </div>

    <div class="mgmt-btn" onclick="app.openManagement()">
        Management
    </div>
</aside>

        <main class="content" id="main-content">
            </main>
    </div>

    <div class="az-rail" id="az-rail"></div>

<script src="app.js"></script>
<script>
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js')
                .then(reg => console.log('Service Worker Registered'))
                .catch(err => console.log('Service Worker Failed', err));
        });
    }
</script>
<div id="pin-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center;">
    <div style="background:white; padding:30px; border-radius:15px; text-align:center; width:80%; max-width:300px;">
        <h3 style="margin-top:0;">Management Login</h3>
        <input type="password" id="pin-field" inputmode="numeric" pattern="[0-9]*" placeholder="Enter PIN" 
               style="width:100%; padding:15px; font-size:24px; text-align:center; border:2px solid #ccc; border-radius:10px; margin-bottom:15px;">
        <div style="display:flex; gap:10px;">
            <button onclick="document.getElementById('pin-modal').style.display='none'" style="flex:1; padding:10px; border:none; border-radius:5px;">Cancel</button>
            <button onclick="app.verifyPin()" style="flex:1; padding:10px; border:none; border-radius:5px; background:var(--nursery-green); color:white; font-weight:bold;">Login</button>
        </div>
    </div>
</div>
</body>
</html>
