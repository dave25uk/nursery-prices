<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Nursery Prices">
    
    <title>The Old Forge Nursery - Price List 2026</title>
    <style>
        :root { --primary: #2e7d32; --bg: #f4f4f4; --text: #222; --card-bg: #ffffff; --border: #444; --tab-bg: #ffffff; --tab-text: #444; --accent: var(--primary); }
        body { font-family: -apple-system, Helvetica, Arial, sans-serif; background: var(--bg); margin: 0; padding: 0; color: var(--text); padding-bottom: 180px; }
        .header { background: var(--card-bg); padding: 15px; border-bottom: 2px solid var(--border); position: sticky; top: 0; z-index: 100; }
        .title-row { display: flex; justify-content: center; align-items: center; margin-bottom: 10px; }
        h1 { margin: 0; font-size: 1.2em; color: var(--primary); text-transform: uppercase; }
        #search-bar { width: 100%; padding: 15px; font-size: 18px; border: 2px solid var(--border); border-radius: 10px; box-sizing: border-box; -webkit-appearance: none; }
        
        #home-page { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 50vh; text-align: center; padding: 20px; }
        .home-title { font-size: 2.4em; font-weight: 800; margin-bottom: 5px; color: var(--primary); }
        .home-subtitle { font-size: 1.6em; font-weight: 600; }

        .tab-bar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--tab-bg); border-top: 2px solid var(--border); display: flex; flex-wrap: wrap; justify-content: center; z-index: 1000; padding: 10px; box-shadow: 0 -4px 10px rgba(0,0,0,0.1); }
        .tab-item { padding: 12px 18px; margin: 4px; border-radius: 8px; font-weight: bold; font-size: 0.9em; color: var(--tab-text); border: 1px solid #bbb; background: #fff; }
        .tab-item.active { background: var(--primary); color: white; border-color: var(--primary); }
        
        #product-view { padding: 15px; display: none; }
        .product-item { background: var(--card-bg); padding: 15px; margin-bottom: 12px; border: 2px solid var(--border); border-radius: 10px; border-left: 12px solid var(--accent); }
        .prod-row { display: flex; justify-content: space-between; align-items: center; }
        .prod-name { font-size: 1.25em; font-weight: bold; }
        .prod-price { background: var(--accent); color: white; padding: 8px 14px; border-radius: 8px; font-weight: 800; min-width: 80px; text-align: center; }
        .prod-offer { display: inline-block; margin-top: 10px; font-size: 0.95em; font-weight: bold; color: #d35400; background: #fff3e0; padding: 5px 10px; border-radius: 6px; border: 1px solid #ffe0b2; }

        /* Theme Accents */
        .theme-compost { --accent: #795548; }
        .theme-perennials { --accent: #9c27b0; }
        .theme-shrubs { --accent: #2e7d32; }
        .theme-bedding { --accent: #e91e63; }
        .theme-stone { --accent: #607d8b; }
        .theme-veg { --accent: #fbc02d; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-row"><h1>The Old Forge Nursery</h1></div>
        <input type="text" id="search-bar" placeholder="Search plants..." oninput="handleSearch()">
    </div>

<div id="home-page">
    <img src="logo.png" alt="Logo" style="max-width: 400px; margin-bottom: 20px;">
    <div class="home-subtitle">Price List 2026</div>
</div>

    <div id="product-view"></div>

    <div class="tab-bar" id="tab-bar"></div>

    <script>
        var nurseryData = {};
        var currentCategory = "home";
        var defaultData = "Instructions,Please upload prices.csv to GitHub,£0,";

        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js');
        }

        function getThemeClass(cat) {
            var c = cat.toLowerCase();
            if (c.indexOf('compost') !== -1) return 'theme-compost';
            if (c.indexOf('perennial') !== -1) return 'theme-perennials';
            if (c.indexOf('shrub') !== -1) return 'theme-shrubs';
            if (c.indexOf('bedding') !== -1) return 'theme-bedding';
            if (c.indexOf('stone') !== -1 || c.indexOf('sand') !== -1) return 'theme-stone';
            if (c.indexOf('veg') !== -1) return 'theme-veg';
            return '';
        }

        function sanitizeEncoding(str) {
            return str.replace(/\uFFFD/g, '£').replace(/\u00C2\u00A3/g, '£').replace(/\u00A3/g, '£');
        }

        function parseData(rawData) {
            var cleanData = sanitizeEncoding(rawData);
            var lines = cleanData.trim().split('\n');
            nurseryData = {};
            
            for (var i = 1; i < lines.length; i++) {
                var cols = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                if (cols.length >= 3) {
                    var cat = cols[0].trim().replace(/^"|"$/g, '');
                    var name = cols[1].trim().replace(/^"|"$/g, '');
                    var price = cols[2].trim().replace(/^"|"$/g, '');
                    var offer = cols[3] ? cols[3].trim().replace(/^"|"$/g, '') : "";

                    if (!nurseryData[cat]) nurseryData[cat] = [];
                    nurseryData[cat].push({ name: name, price: price, offer: offer });
                }
            }
            for (var cat in nurseryData) {
                nurseryData[cat].sort((a, b) => a.name.localeCompare(b.name));
            }
        }

        async function init() {
            let dataToUse = defaultData;
            try {
                const cacheBuster = '?v=' + new Date().getTime();
                const response = await fetch('prices.csv' + cacheBuster); 
                if (response.ok) {
                    const remoteData = await response.text();
                    if (remoteData && remoteData.length > 50) {
                        localStorage.setItem('forge_nursery_data', remoteData);
                        dataToUse = remoteData;
                    }
                }
            } catch (e) { 
                dataToUse = localStorage.getItem('forge_nursery_data') || defaultData;
            }

            parseData(dataToUse);
            renderTabs();
            showHome();
        }

        function renderTabs() {
            var categories = Object.keys(nurseryData).sort(); 
            var tabHtml = '<div class="tab-item" id="tab-home" onclick="showHome()">HOME</div>';
            for (var i = 0; i < categories.length; i++) {
                tabHtml += '<div class="tab-item" id="tab-' + i + '" onclick="showProducts(\'' + categories[i] + '\', ' + i + ')">' + categories[i] + '</div>';
            }
            document.getElementById('tab-bar').innerHTML = tabHtml;
        }

        function renderList(products, catName) {
            var theme = getThemeClass(catName || "");
            var html = '';
            for (var i = 0; i < products.length; i++) {
                var itemTheme = catName ? theme : getThemeClass(findCatOfProduct(products[i].name));
                var offerHtml = products[i].offer ? '<div class="prod-offer">OFFER: ' + products[i].offer + '</div>' : '';
                html += '<div class="product-item ' + itemTheme + '"><div class="prod-row"><div class="prod-name">' + products[i].name + '</div><div class="prod-price">' + products[i].price + '</div></div>' + offerHtml + '</div>';
            }
            document.getElementById('product-view').innerHTML = html || '<div style="text-align:center;padding:50px;">No Results</div>';
        }

        function showHome() { hideAll(); document.getElementById('home-page').style.display = 'flex'; document.getElementById('tab-home').classList.add('active'); }
        function showProducts(cat, index) { hideAll(); document.getElementById('product-view').style.display = 'block'; var activeTab = document.getElementById('tab-' + index); if (activeTab) activeTab.classList.add('active'); renderList(nurseryData[cat], cat); window.scrollTo(0,0); }
        function hideAll() { document.getElementById('home-page').style.display = 'none'; document.getElementById('product-view').style.display = 'none'; var tabs = document.getElementsByClassName('tab-item'); for (var i=0; i<tabs.length; i++) tabs[i].classList.remove('active'); }

        function handleSearch() {
            var q = document.getElementById('search-bar').value.toLowerCase();
            if (q === "") { if (currentCategory === "home") showHome(); else showProducts(currentCategory); return; }
            hideAll(); document.getElementById('product-view').style.display = 'block';
            var results = [];
            for (var cat in nurseryData) { for (var i = 0; i < nurseryData[cat].length; i++) { if (nurseryData[cat][i].name.toLowerCase().indexOf(q) !== -1) results.push(nurseryData[cat][i]); } }
            results.sort((a, b) => a.name.localeCompare(b.name));
            renderList(results, "");
        }

        function findCatOfProduct(name) { for (var cat in nurseryData) { for (var i=0; i<nurseryData[cat].length; i++) { if (nurseryData[cat][i].name === name) return cat; } } return ""; }

        init();
    </script>
</body>
</html>
