<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nursery Management</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="app-container">
        <header class="header">
            <h1>Stock Management</h1>
            <div class="search-wrapper">
                <input type="text" id="main-search" placeholder="Search to edit..." oninput="app.handleSearch()">
            </div>
        </header>

        <nav class="sidebar" id="sidebar-nav">
    <button class="nav-btn" onclick="window.location.href='index.html'" style="margin-bottom: 20px; background: #444; color: #fff; width: 100%;">
        ← BACK TO SHOP
    </button>

    <button class="nav-btn" onclick="app.openModal(null)" style="border-left: 1px solid var(--border-color) !important;">
        + NEW PRODUCT
    </button>

    <button class="nav-btn" onclick="app.addNewCategory()" style="border-left: 1px solid var(--border-color) !important; margin-bottom: 20px;">
        + NEW CATEGORY
    </button>

    <div class="sidebar-nav-links" id="sidebar-nav-list">
        </div>
</nav>

        <main class="content" id="main-content">
            </main>
    </div>

    <div id="edit-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.7); z-index:1000; align-items:center; justify-content:center;">
        <div style="background:white; width:90%; max-width:500px; border-radius:15px; padding:20px; box-shadow: 0 10px 25px rgba(0,0,0,0.5);">
            <h2 id="modal-title" style="margin-top:0; color:var(--nursery-green);">Edit Product</h2>
            
            <div style="display:flex; flex-direction:column; gap:15px;">
                <div>
    <label style="display:block; font-weight:bold; font-size:12px;">Category</label>
    <select id="edit-cat" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px; background: white; height: 45px;">
        </select>
</div>
                <div>
                    <label style="display:block; font-weight:bold; font-size:12px;">Plant Name</label>
                    <input type="text" id="edit-name" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
                </div>
                <div>
                    <label style="display:block; font-weight:bold; font-size:12px;">Offer (e.g. 3 for £10)</label>
                    <input type="text" id="edit-offer" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
                </div>
                <div>
                    <label style="display:block; font-weight:bold; font-size:12px;">Price</label>
                    <input type="text" id="edit-price" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
                </div>
                <div>
                    <label style="display:block; font-weight:bold; font-size:12px;">Stock Status</label>
                    <select id="edit-stock" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
                        <option value="">In Stock</option>
                        <option value="Low Stock">Low Stock</option>
                        <option value="Out of Stock">Out of Stock</option>
                    </select>
                </div>
                <div>
                    <label style="display:block; font-weight:bold; font-size:12px;">Comments</label>
                    <input type="text" id="edit-comments" style="width:100%; padding:10px; border:1px solid #ccc; border-radius:5px;">
                </div>
            </div>

            <div style="display:flex; gap:10px; margin-top:20px;">
                <button onclick="app.closeModal()" style="flex:1; padding:12px; border-radius:8px; border:none; background:#eee; font-weight:bold;">Cancel</button>
                <button onclick="app.saveProduct()" style="flex:2; padding:12px; border-radius:8px; border:none; background:var(--nursery-green); color:white; font-weight:bold;">Save Changes</button>
            </div>
            <button id="del-btn" onclick="app.deleteProduct()" style="width:100%; margin-top:15px; padding:10px; border:none; background:none; color:#d32f2f; font-weight:bold; text-decoration:underline;">Delete Product</button>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
